apiVersion: v1
kind: ServiceAccount
metadata:
  name: livestream-tts-sa
  namespace: livestream-tts
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: livestream-tts-role
  namespace: livestream-tts
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "pods", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: livestream-tts-rb
  namespace: livestream-tts
subjects:
  - kind: ServiceAccount
    name: livestream-tts-sa
roleRef:
  kind: Role
  name: livestream-tts-role
  apiGroup: rbac.authorization.k8s.io
