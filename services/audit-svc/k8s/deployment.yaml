apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-svc
  namespace: livestream-tts
  labels:
    app: audit-svc
    service-type: audit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audit-svc
  template:
    metadata:
      labels:
        app: audit-svc
    spec:
      containers:
        - name: audit-svc
          image: livestream-tts/audit-svc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8016
              name: http
            - containerPort: 50051
              name: grpc
          envFrom:
            - configMapRef:
                name: audit-config
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
