apiVersion: v1
kind: ConfigMap
metadata:
  name: tts-svc-config
  labels:
    app: tts-svc
data:
  config.yaml: |
    # TTS Service Configuration
    # Mounted at /etc/config/tts-svc/config.yaml

    ENV: "production"
    LOG_LEVEL: "INFO"

    # gRPC
    GRPC_PORT: 50051
    GRPC_MAX_WORKERS: 30

    # HTTP
    HTTP_PORT: 8080
    HTTP_HOST: "0.0.0.0"

    # TTS Engine
    TTS_MODEL_PATH: "/models/cosyvoice2"
    TTS_MAX_CONCURRENT: 30
    TTS_CACHE_TTL: 3600
    TTS_USE_GPU: true

    # Database (future)
    DB_HOST: "postgres-lb.livestream-tts.svc.cluster.local"
    DB_PORT: 5432
    DB_NAME: "livestream_tts"
    DB_POOL_SIZE: 10

    # Redis / Cache (future)
    REDIS_HOST: "redis-cluster.livestream-tts.svc.cluster.local"
    REDIS_PORT: 6379

    # Kafka (future)
    KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster.livestream-tts.svc.cluster.local:9093"
