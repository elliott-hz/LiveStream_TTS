---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-svc-config
  namespace: livestream-tts
  labels:
    app: gateway-svc
data:
  config.yaml: |
    HTTP_HOST: "0.0.0.0"
    HTTP_PORT: 8080
    LOG_LEVEL: "INFO"
    LOG_JSON: true
    JWT_ALGORITHM: "HS256"
    JWT_ACCESS_EXPIRE_MINUTES: 30
    JWT_REFRESH_EXPIRE_DAYS: 7
    USER_SVC_GRPC_HOST: "user-svc.livestream-tts.svc.cluster.local"
    USER_SVC_GRPC_PORT: 50051
    PRODUCT_SVC_GRPC_HOST: "product-svc.livestream-tts.svc.cluster.local"
    PRODUCT_SVC_GRPC_PORT: 50051
    SCRIPT_SVC_GRPC_HOST: "script-svc.livestream-tts.svc.cluster.local"
    SCRIPT_SVC_GRPC_PORT: 50051
    TTS_SVC_GRPC_HOST: "tts-svc.livestream-tts.svc.cluster.local"
    TTS_SVC_GRPC_PORT: 50051
    RATE_LIMIT_ADMIN_RPS: 100
    RATE_LIMIT_TTS_RPS: 50
    RATE_LIMIT_DEFAULT_RPS: 20
    RATE_LIMIT_WS_PER_IP: 5
    RATE_LIMIT_BURST_MULTIPLIER: 2
    CORS_ORIGINS:
      - "*"
    CORS_ALLOW_CREDENTIALS: true
