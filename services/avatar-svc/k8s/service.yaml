apiVersion: v1
kind: Service
metadata:
  name: avatar-svc
  namespace: livestream-tts
  labels:
    app: avatar-svc
    service: avatar
spec:
  type: ClusterIP
  selector:
    app: avatar-svc
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
    - name: http
      port: 8004
      targetPort: http
      protocol: TCP
