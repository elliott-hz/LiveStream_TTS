apiVersion: apps/v1
kind: Deployment
metadata:
  name: render-svc
  labels:
    app: render-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: render-svc
  template:
    metadata:
      labels:
        app: render-svc
    spec:
      serviceAccountName: livestream-tts-sa
      nodeSelector:
        accelerator: nvidia-l40s  # GPU node pool
      containers:
        - name: render-svc
          image: ghcr.io/livestream-tts/render-svc:latest
          ports:
            - containerPort: 50053
              name: grpc
            - containerPort: 8083
              name: http
          env:
            - name: ENV
              value: "production"
            - name: RENDER_GPU_DEVICE
              value: "0"
            - name: RENDER_GPU_MEMORY_FRAC
              value: "0.8"
            - name: RENDER_FRAME_WIDTH
              value: "1920"
            - name: RENDER_FRAME_HEIGHT
              value: "1080"
            - name: RENDER_FPS
              value: "30"
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: models
              mountPath: /models
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: models
          hostPath:
            path: /data/models
