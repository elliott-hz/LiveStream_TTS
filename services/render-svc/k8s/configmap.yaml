apiVersion: v1
kind: ConfigMap
metadata:
  name: render-svc-config
  labels:
    app: render-svc
data:
  config.yaml: |
    # Render Service Configuration
    # Mounted at /etc/config/render-svc/config.yaml

    ENV: "production"
    LOG_LEVEL: "INFO"

    # gRPC
    GRPC_PORT: 50053
    GRPC_MAX_WORKERS: 20

    # HTTP
    HTTP_PORT: 8083
    HTTP_HOST: "0.0.0.0"

    # GPU
    RENDER_GPU_DEVICE: 0
    RENDER_GPU_MEMORY_FRAC: 0.8
    RENDER_GPU_BATCH_SIZE: 1

    # Video
    RENDER_FRAME_WIDTH: 1920
    RENDER_FRAME_HEIGHT: 1080
    RENDER_FPS: 30

    # Database (future)
    DB_HOST: "postgres-lb.livestream-tts.svc.cluster.local"
    DB_PORT: 5432
    DB_NAME: "livestream_tts"
    DB_POOL_SIZE: 10

    # Redis / Cache (future)
    REDIS_HOST: "redis-cluster.livestream-tts.svc.cluster.local"
    REDIS_PORT: 6379

    # Kafka (future)
    KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster.livestream-tts.svc.cluster.local:9093"
