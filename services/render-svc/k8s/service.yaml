apiVersion: v1
kind: Service
metadata:
  name: render-svc
  labels:
    app: render-svc
spec:
  type: ClusterIP
  selector:
    app: render-svc
  ports:
    - name: grpc
      port: 50053
      targetPort: 50053
      protocol: TCP
    - name: http
      port: 8083
      targetPort: 8083
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: render-svc-headless
  labels:
    app: render-svc
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: render-svc
  ports:
    - name: grpc
      port: 50053
      targetPort: 50053
    - name: http
      port: 8083
      targetPort: 8083
