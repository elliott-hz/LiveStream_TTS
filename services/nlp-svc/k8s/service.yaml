---
apiVersion: v1
kind: Service
metadata:
  name: nlp-svc
  namespace: livestream-tts
  labels:
    app: nlp-svc
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: nlp-svc
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
