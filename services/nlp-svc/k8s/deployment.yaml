---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-svc
  namespace: livestream-tts
  labels:
    app: nlp-svc
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nlp-svc
  template:
    metadata:
      labels:
        app: nlp-svc
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: livestream-tts-sa
      terminationGracePeriodSeconds: 60
      containers:
        - name: nlp-svc
          image: ghcr.io/livestream-tts/nlp-svc:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: ENV
              value: "production"
            - name: NLP_SVC_HTTP_HOST
              value: "0.0.0.0"
            - name: NLP_SVC_HTTP_PORT
              value: "8080"
            - name: NLP_SVC_GRPC_PORT
              value: "50051"
            - name: NLP_SVC_LOG_LEVEL
              value: "INFO"
            - name: NLP_SVC_LOG_JSON
              value: "true"
            - name: NLP_SVC_LLM_SEMANTIC_ENABLED
              value: "false"
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nlp-secrets
                  key: deepseek-api-key
            - name: DEEPSEEK_BASE_URL
              value: "https://api.deepseek.com"
          envFrom:
            - configMapRef:
                name: nlp-svc-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - nlp-svc
                topologyKey: kubernetes.io/hostname
