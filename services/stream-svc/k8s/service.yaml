apiVersion: v1
kind: Service
metadata:
  name: stream-svc
  labels:
    app: stream-svc
spec:
  type: ClusterIP
  selector:
    app: stream-svc
  ports:
    - name: grpc
      port: 50054
      targetPort: 50054
      protocol: TCP
    - name: http
      port: 8084
      targetPort: 8084
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: stream-svc-headless
  labels:
    app: stream-svc
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: stream-svc
  ports:
    - name: grpc
      port: 50054
      targetPort: 50054
    - name: http
      port: 8084
      targetPort: 8084
