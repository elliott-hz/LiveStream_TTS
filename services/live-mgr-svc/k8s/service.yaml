apiVersion: v1
kind: Service
metadata:
  name: live-mgr-svc
  namespace: livestream-tts
  labels:
    app: live-mgr-svc
    service: live-mgr
spec:
  type: ClusterIP
  ports:
    - port: 50058
      targetPort: 50058
      name: grpc
      protocol: TCP
    - port: 8080
      targetPort: 8080
      name: http
      protocol: TCP
  selector:
    app: live-mgr-svc
