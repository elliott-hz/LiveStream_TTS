apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-mgr-svc
  namespace: livestream-tts
  labels:
    app: live-mgr-svc
    service: live-mgr
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: live-mgr-svc
  template:
    metadata:
      labels:
        app: live-mgr-svc
        service: live-mgr
        tier: backend
    spec:
      serviceAccountName: live-mgr-svc
      terminationGracePeriodSeconds: 30
      containers:
        - name: live-mgr-svc
          image: ghcr.io/livestream-tts/live-mgr-svc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50058
              name: grpc
              protocol: TCP
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: ENV
              value: "production"
            - name: LIVE_MGR_SVC_GRPC_PORT
              value: "50058"
            - name: LIVE_MGR_SVC_HTTP_PORT
              value: "8080"
            - name: LIVE_MGR_SVC_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: live-mgr-svc-config
                  key: DB_HOST
            - name: LIVE_MGR_SVC_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: live-mgr-svc-config
                  key: DB_PORT
            - name: LIVE_MGR_SVC_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: live-mgr-svc-config
                  key: DB_NAME
            - name: LIVE_MGR_SVC_DB_USER
              valueFrom:
                secretKeyRef:
                  name: live-mgr-svc-secret
                  key: DB_USER
            - name: LIVE_MGR_SVC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: live-mgr-svc-secret
                  key: DB_PASSWORD
            - name: LIVE_MGR_SVC_DB_POOL_SIZE
              value: "10"
            - name: LIVE_MGR_SVC_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: live-mgr-svc-config
                  key: KAFKA_BOOTSTRAP_SERVERS
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/config/live-mgr-svc
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: live-mgr-svc-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: live-mgr-svc
  namespace: livestream-tts
  labels:
    app: live-mgr-svc
