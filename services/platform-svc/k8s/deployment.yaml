apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-svc
  labels:
    app.kubernetes.io/name: platform-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-svc
    spec:
      containers:
        - name: platform-svc
          image: platform-svc:latest
          ports:
            - containerPort: 50050
              name: grpc
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: platform-svc-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8081
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8081
            initialDelaySeconds: 5
