apiVersion: v1
kind: Service
metadata:
  name: knowledge-svc
  namespace: livestream-tts
  labels:
    app: knowledge-svc
    service: knowledge
spec:
  type: ClusterIP
  selector:
    app: knowledge-svc
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
    - name: http
      port: 8008
      targetPort: http
      protocol: TCP
