apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-svc
  namespace: livestream-tts
  labels:
    app: knowledge-svc
    service: knowledge
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: knowledge-svc
  template:
    metadata:
      labels:
        app: knowledge-svc
        service: knowledge
        tier: backend
    spec:
      serviceAccountName: knowledge-svc
      terminationGracePeriodSeconds: 30
      containers:
        - name: knowledge-svc
          image: ghcr.io/livestream-tts/knowledge-svc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
              name: grpc
              protocol: TCP
            - containerPort: 8008
              name: http
              protocol: TCP
          env:
            - name: ENV
              value: "production"
            - name: KNOWLEDGE_SVC_GRPC_PORT
              value: "50051"
            - name: KNOWLEDGE_SVC_HTTP_PORT
              value: "8008"
            - name: KNOWLEDGE_SVC_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: knowledge-svc-config
                  key: DB_HOST
            - name: KNOWLEDGE_SVC_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: knowledge-svc-config
                  key: DB_PORT
            - name: KNOWLEDGE_SVC_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: knowledge-svc-config
                  key: DB_NAME
            - name: KNOWLEDGE_SVC_DB_USER
              valueFrom:
                secretKeyRef:
                  name: knowledge-svc-secret
                  key: DB_USER
            - name: KNOWLEDGE_SVC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: knowledge-svc-secret
                  key: DB_PASSWORD
            - name: KNOWLEDGE_SVC_DB_POOL_SIZE
              value: "10"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8008
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8008
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/config/knowledge-svc
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: knowledge-svc-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: knowledge-svc
  namespace: livestream-tts
  labels:
    app: knowledge-svc
