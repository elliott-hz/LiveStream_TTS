apiVersion: v1
kind: ConfigMap
metadata:
  name: user-svc-config
  namespace: livestream-tts
data:
  # Database
  DB_HOST: "postgresql.livestream-tts.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "livestream_tts"
  DB_USER: "livestream"

  # JWT
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  JWT_ALGORITHM: "HS256"

  # gRPC
  GRPC_PORT: "50051"
  GRPC_MAX_WORKERS: "20"

  # HTTP
  HTTP_PORT: "8080"
  HTTP_HOST: "0.0.0.0"

  # Logging
  LOG_LEVEL: "INFO"
