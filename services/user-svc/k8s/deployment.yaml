apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-svc
  namespace: livestream-tts
  labels:
    app: user-svc
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-svc
  template:
    metadata:
      labels:
        app: user-svc
    spec:
      serviceAccountName: user-svc
      containers:
        - name: user-svc
          image: ${REGISTRY:-localhost}/user-svc:${TAG:-latest}
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ENV
              value: "production"
            - name: SERVICE_NAME
              value: "user-svc"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: user-svc-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: user-svc-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: user-svc-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: user-svc-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-svc-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-svc-secret
                  key: JWT_SECRET
            - name: GRPC_PORT
              value: "50051"
            - name: HTTP_PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-svc
  namespace: livestream-tts
