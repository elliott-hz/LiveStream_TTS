apiVersion: v1
kind: ConfigMap
metadata:
  name: script-svc-config
  labels:
    app: script-svc
data:
  config.yaml: |
    DB_HOST: postgres-primary.livestream-tts.svc.cluster.local
    DB_PORT: 5432
    DB_NAME: livestream_tts
    DB_POOL_SIZE: 10
    GRPC_PORT: 50051
    HTTP_PORT: 8081
    HTTP_HOST: 0.0.0.0
    KAFKA_BOOTSTRAP_SERVERS: kafka.livestream-tts.svc.cluster.local:9092
    KAFKA_GROUP_ID: script-svc
    LOG_LEVEL: INFO
    DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
