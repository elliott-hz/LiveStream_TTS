apiVersion: apps/v1
kind: Deployment
metadata:
  name: script-svc
  labels:
    app: script-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: script-svc
  template:
    metadata:
      labels:
        app: script-svc
    spec:
      serviceAccountName: livestream-tts-sa
      containers:
        - name: script-svc
          image: ghcr.io/livestream-tts/script-svc:latest
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8081
              name: http
          env:
            - name: ENV
              value: "production"
            - name: SCRIPT_SVC_LOG_LEVEL
              value: "INFO"
            - name: SCRIPT_SVC_DB_POOL_SIZE
              value: "10"
            - name: SCRIPT_SVC_GRPC_PORT
              value: "50051"
            - name: SCRIPT_SVC_HTTP_PORT
              value: "8081"
          envFrom:
            - configMapRef:
                name: script-svc-config
            - secretRef:
                name: livestream-tts-secrets
                optional: true
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/config/script-svc
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: script-svc-config
