// Render Service — Visual Rendering, Lip Sync, Expression, FFmpeg Composition
syntax = "proto3";

package render.v1;

import "common/v1/common.proto";

option go_package = "github.com/livestream-tts/proto/render/v1;renderv1";

service RenderService {
  // ── Rendering Pipeline ──
  rpc Render(RenderRequest) returns (RenderResponse);

  // ── Lip Sync ──
  rpc PredictLipSync(PredictLipSyncRequest) returns (PredictLipSyncResponse);

  // ── Health ──
  rpc GetGPUStatus(GetGPUStatusRequest) returns (GPUStatus);
}

message RenderRequest {
  string request_id = 1;
  string avatar_id = 2;
  bytes audio_data = 3;
  int32 sample_rate = 4;
  string background_id = 5;
  repeated Overlay overlays = 6;
  VideoConfig video_config = 7;
}

message RenderResponse {
  string request_id = 1;
  bytes video_frame = 2;
  int32 frame_number = 3;
  bool is_final = 4;
}

message VideoConfig {
  int32 width = 1;
  int32 height = 2;
  int32 fps = 3;
  string codec = 4;
}

message Overlay {
  string overlay_id = 1;
  OverlayType type = 2;
  string content = 3;
  Position position = 4;
}

enum OverlayType {
  OVERLAY_TYPE_UNSPECIFIED = 0;
  OVERLAY_TYPE_PRODUCT_CARD = 1;
  OVERLAY_TYPE_PRICE_TAG = 2;
  OVERLAY_TYPE_COUPON = 3;
  OVERLAY_TYPE_WATERMARK = 4;
  OVERLAY_TYPE_LOGO = 5;
}

message Position {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
  float opacity = 5;
}

message PredictLipSyncRequest {
  bytes audio_data = 1;
  int32 sample_rate = 2;
  string avatar_id = 3;
}

message PredictLipSyncResponse {
  repeated float blendshape_weights = 1;
  int32 frame_count = 2;
}

message GetGPUStatusRequest {}

message GPUStatus {
  string device_name = 1;
  int32 total_memory_mb = 2;
  int32 used_memory_mb = 3;
  int32 gpu_utilization_pct = 4;
  int32 active_streams = 5;
}
