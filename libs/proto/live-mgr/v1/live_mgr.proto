// Live Manager Service — Live Room CRUD, Stream Config, Playlist Scheduler
syntax = "proto3";

package live_mgr.v1;

import "common/v1/common.proto";

option go_package = "github.com/livestream-tts/proto/live_mgr/v1;livemgrv1";

service LiveManagerService {
  // ── Live Room ──
  rpc CreateLiveRoom(CreateLiveRoomRequest) returns (LiveRoom);
  rpc GetLiveRoom(GetLiveRoomRequest) returns (LiveRoom);
  rpc UpdateLiveRoom(UpdateLiveRoomRequest) returns (LiveRoom);
  rpc ListLiveRooms(ListLiveRoomsRequest) returns (ListLiveRoomsResponse);

  // ── State Machine ──
  rpc StartLive(StartLiveRequest) returns (LiveRoom);
  rpc PauseLive(PauseLiveRequest) returns (LiveRoom);
  rpc ResumeLive(ResumeLiveRequest) returns (LiveRoom);
  rpc StopLive(StopLiveRequest) returns (LiveRoom);
  rpc EmergencyStop(EmergencyStopRequest) returns (LiveRoom);

  // ── Playlist ──
  rpc CreatePlaylist(CreatePlaylistRequest) returns (Playlist);
  rpc UpdatePlaylist(UpdatePlaylistRequest) returns (Playlist);
  rpc GetPlaylist(GetPlaylistRequest) returns (Playlist);

  // ── Stream Config ──
  rpc GetStreamConfig(GetStreamConfigRequest) returns (StreamConfig);
  rpc UpdateStreamConfig(UpdateStreamConfigRequest) returns (StreamConfig);
}

// ── Live Room ──

message LiveRoom {
  string live_room_id = 1;
  string store_id = 2;
  string title = 3;
  string cover_url = 4;
  LiveRoomStatus status = 5;
  string avatar_id = 6;
  string voice_id = 7;
  string script_id = 8;
  StreamConfig stream_config = 9;
  LoopRule loop_rule = 10;
  repeated string target_platforms = 11;  // taobao, douyin, jd, kuaishou
  LiveSession current_session = 12;
  common.v1.AuditInfo audit_info = 13;
}

enum LiveRoomStatus {
  LIVE_ROOM_STATUS_UNSPECIFIED = 0;
  LIVE_ROOM_STATUS_DRAFT = 1;
  LIVE_ROOM_STATUS_READY = 2;
  LIVE_ROOM_STATUS_LIVE = 3;
  LIVE_ROOM_STATUS_PAUSED = 4;
  LIVE_ROOM_STATUS_ENDED = 5;
  LIVE_ROOM_STATUS_ERROR = 6;
}

message LiveSession {
  string session_id = 1;
  int64 started_at = 2;
  int64 ended_at = 3;
  int32 viewer_peak = 4;
  int32 total_interactions = 5;
}

message StreamConfig {
  string rtmp_url = 1;
  string stream_key = 2;
  VideoProfile video_profile = 3;
  int32 width = 4;               // default 1920
  int32 height = 5;              // default 1080
  int32 fps = 6;                 // default 30
  int32 video_bitrate_kbps = 7;   // default 4000
  int32 audio_bitrate_kbps = 8;   // default 128
}

enum VideoProfile {
  VIDEO_PROFILE_UNSPECIFIED = 0;
  VIDEO_PROFILE_BASELINE = 1;
  VIDEO_PROFILE_MAIN = 2;
  VIDEO_PROFILE_HIGH = 3;
}

message LoopRule {
  LoopMode mode = 1;
  map<string, int32> weights = 2;   // product_id → weight (for weighted mode)
  string schedule_json = 3;         // for scheduled mode
}

enum LoopMode {
  LOOP_MODE_UNSPECIFIED = 0;
  LOOP_MODE_ROUND_ROBIN = 1;
  LOOP_MODE_WEIGHTED = 2;
  LOOP_MODE_SCHEDULED = 3;
  LOOP_MODE_SMART = 4;             // Phase 3
}

// ── Playlist ──

message Playlist {
  string playlist_id = 1;
  string live_room_id = 2;
  repeated PlaylistItem items = 3;
  LoopRule loop_rule = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message PlaylistItem {
  string item_id = 1;
  int32 order = 2;
  string script_section_id = 3;
  string product_id = 4;
  int32 duration_ms = 5;
  ItemType type = 6;
}

enum ItemType {
  ITEM_TYPE_UNSPECIFIED = 0;
  ITEM_TYPE_SCRIPT_SEGMENT = 1;
  ITEM_TYPE_WARMUP = 2;
  ITEM_TYPE_BREAK = 3;
  ITEM_TYPE_INTERACTIVE_REPLY = 4;
}

// ── Requests ──

message CreateLiveRoomRequest {
  string store_id = 1;
  string title = 2;
  string avatar_id = 3;
  string voice_id = 4;
  repeated string target_platforms = 5;
}

message GetLiveRoomRequest {
  string live_room_id = 1;
}

message UpdateLiveRoomRequest {
  string live_room_id = 1;
  optional string title = 2;
  optional string cover_url = 3;
  optional string avatar_id = 4;
  optional string voice_id = 5;
}

message ListLiveRoomsRequest {
  string store_id = 1;
  optional LiveRoomStatus status = 2;
  common.v1.Pagination pagination = 3;
}

message ListLiveRoomsResponse {
  repeated LiveRoom live_rooms = 1;
  common.v1.PageInfo page_info = 2;
}

message StartLiveRequest { string live_room_id = 1; }
message PauseLiveRequest { string live_room_id = 1; }
message ResumeLiveRequest { string live_room_id = 1; }
message StopLiveRequest { string live_room_id = 1; }
message EmergencyStopRequest { string live_room_id = 1; string reason = 2; }

message CreatePlaylistRequest {
  string live_room_id = 1;
  repeated PlaylistItem items = 2;
  LoopRule loop_rule = 3;
}

message UpdatePlaylistRequest {
  string playlist_id = 1;
  repeated PlaylistItem items = 2;
  LoopRule loop_rule = 3;
}

message GetPlaylistRequest { string playlist_id = 1; }

message GetStreamConfigRequest { string live_room_id = 1; }
message UpdateStreamConfigRequest {
  string live_room_id = 1;
  StreamConfig stream_config = 2;
}
