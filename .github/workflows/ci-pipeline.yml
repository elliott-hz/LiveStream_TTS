name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7"

jobs:
  # ── Detect Changed Services (path-based CI) ──
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            gateway-svc: services/gateway-svc/**
            platform-svc: services/platform-svc/**
            knowledge-svc: services/knowledge-svc/**
            tts-svc: services/tts-svc/**
            nlp-svc: services/nlp-svc/**
            render-svc: services/render-svc/**
            interact-svc: services/interact-svc/**
            stream-svc: services/stream-svc/**
            libs: libs/**
            proto: libs/proto/**

  # ── Lint (always runs) ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff black mypy
      - run: ruff check services/ libs/
      - run: black --check services/ libs/
      - run: mypy services/ libs/ --ignore-missing-imports || true

  # ── Proto Check (runs when proto files change) ──
  proto:
    needs: changes
    if: needs.changes.outputs.services != '[]' && contains(needs.changes.outputs.services, 'proto')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install grpcio-tools mypy-protobuf
      - run: bash scripts/compile_protos.sh
      - run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Proto compilation produced uncommitted changes. Run scripts/compile_protos.sh locally."
            git diff --name-only
            exit 1
          fi

  # ── Unit Tests (per-service, parallel) ──
  test:
    needs: changes
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e libs/common -e libs/db -e libs/kafka
      - run: pip install pytest pytest-asyncio pytest-cov
      - run: python -m pytest services/*/tests/ --cov=services --cov-report=xml -x
      - uses: codecov/codecov-action@v3
        if: github.event_name == 'push'
        with:
          file: ./coverage.xml

  # ── Build & Push Docker Images (main branch only) ──
  build:
    needs: [lint, test, proto]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - platform-svc
          - gateway-svc
          - knowledge-svc
          - tts-svc
          - nlp-svc
          - render-svc
          - interact-svc
          - stream-svc
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
